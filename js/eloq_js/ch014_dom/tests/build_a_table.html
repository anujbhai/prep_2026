    function build_table(data) {
      const table = document.createElement("table")
      const fields = Object.keys(data[0]) // get the keys of the direct child of data

      for (const field of fields) { // loop through the number of keys (fields)
        const head_cell = document.createElement("th")
        head_cell.textContent = field; // assign text content to th
        head_row.appendChild(head_cell)
      }

      table.appendChild(head_row)

        const row = document.createElement("tr") // create one row for each object entry in data (direct child)
